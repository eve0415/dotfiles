# =========================
# Prefix
# =========================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# =========================
# General
# =========================
set -g mouse on
set -g history-limit 100000
set -g default-terminal "screen-256color"
set -sg escape-time 0
set -g focus-events on

# =========================
# Index start at 1
# =========================
set -g base-index 1
setw -g pane-base-index 1

# =========================
# Reload config
# =========================
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# =========================
# Split panes
# =========================
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# =========================
# Pane navigation
# =========================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# =========================
# Resize panes
# =========================
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# =========================
# Window navigation
# =========================
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window

# =========================
# Copy mode (vim-like)
# =========================
setw -g mode-keys vi

# =========================
# Status bar
# =========================
set -g status-position bottom
set -g status-style "bg=default"
set -g status-left ""
set -g status-right "#[fg=245]%H:%M "
set -g status-interval 60
set -g window-status-style 'fg=colour244 bg=default'
set -g window-status-current-style 'fg=colour255 bg=colour27 bold'

setw -g window-status-current-format "#[fg=39]#I:#W#[default]"
setw -g window-status-format "#[fg=245]#I:#W#[default]"

# =========================
# Easier pane closing confirmation disabled
# =========================
bind x kill-pane
bind X kill-window

# =========================
# Plugins (TPM)
# =========================
# TPM 自体は git submodule として管理 (user/.tmux/plugins/tpm)
# 他のプラグインは初回のみ `prefix + I` でインストール
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# which-key 風のメニュー: prefix + Space で表示
set -g @plugin 'alexwforsythe/tmux-which-key'

# Catppuccin Mocha (Neovim と統一)
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha'

# TPM の初期化 (この行は必ず最後に置くこと)
run '~/.tmux/plugins/tpm/tpm'
